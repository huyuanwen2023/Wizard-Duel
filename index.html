<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Wizard Duel</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="setup" id="setup">
        <div class="setup__art" aria-hidden="true">
          <div class="crest">
            <span>WD</span>
          </div>
          <div class="wand wand--one"></div>
          <div class="wand wand--two"></div>
        </div>
        <div class="setup__content">
          <p class="eyebrow">Hogwarts tournament</p>
          <h1>Wizard Duel</h1>
          <p class="intro">
            Race through the castle, collect spell cards, cast magic, win duels, and reach the Great Hall with 5 spells.
          </p>
          <label class="field">
            <span>Players</span>
            <select id="playerCount">
              <option value="2">2 players</option>
              <option value="3">3 players</option>
              <option value="4">4 players</option>
            </select>
          </label>
          <div class="name-fields" id="nameFields" aria-label="Player names"></div>
          <button class="primary" id="startGame">Start game</button>
        </div>
      </section>

      <section class="game hidden" id="game">
        <header class="topbar">
          <div>
            <p class="eyebrow">Wizard Duel</p>
            <h2 id="turnTitle">Player 1's turn</h2>
          </div>
          <div class="topbar__actions">
            <button class="ghost" id="newGame">New game</button>
            <button class="ghost" id="reverseDirection">Reverse direction</button>
            <button class="primary" id="rollDice">Roll dice</button>
            <button class="end-turn" id="endTurn">End turn</button>
          </div>
        </header>

        <section class="status-row">
          <div class="die" id="die">-</div>
          <div class="message" id="message">Roll to begin the tournament.</div>
        </section>

        <section class="duel-panel hidden" id="duelPanel" aria-live="polite">
          <div>
            <p class="eyebrow">Duel action</p>
            <h3 id="duelTitle">Duel</h3>
            <p id="duelText"></p>
          </div>
          <div class="duel-panel__actions" id="duelActions"></div>
        </section>

        <section class="layout">
          <div class="board-wrap">
            <div class="board" id="board" aria-label="Wizard Duel board"></div>
          </div>

          <aside class="panel">
            <div class="hand-section" id="handPanel">
              <div class="hand-toolbar">
                <span id="handOwner">Current hand</span>
                <span class="turn-hint">Use End turn when finished</span>
              </div>
              <div class="cards" id="cards"></div>
            </div>

            <div class="tabs" role="tablist" aria-label="Game information">
              <button class="tab is-active" data-tab="players">Players</button>
              <button class="tab" data-tab="log">Log</button>
            </div>

            <div class="tab-panel" id="playersPanel"></div>
            <div class="tab-panel hidden" id="logPanel">
              <ol class="log" id="log"></ol>
            </div>
          </aside>
        </section>
      </section>
    </main>

    <div class="modal hidden" id="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal__card">
        <h3 id="modalTitle">Choose</h3>
        <p id="modalText"></p>
        <div class="modal__actions" id="modalActions"></div>
      </div>
    </div>

    <div class="toasts" id="toasts" aria-live="polite" aria-label="Recent game messages"></div>

    <script src="game.js?v=duel-action-3"></script>
  </body>
</html>
